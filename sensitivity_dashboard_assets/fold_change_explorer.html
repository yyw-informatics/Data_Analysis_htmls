    const ANT = DATA.antigens, SUB = DATA.subsets, ANTLAB = DATA.antigen_labels, ANTCOL = DATA.antigen_colors;
    const STATS = DATA.stats, OPT = DATA.options, DEF = DATA.defaults;
    const SCHED = ["Simultaneous", "Treatment 1 first", "Treatment-2-first"];
    const FCV = [0.25, 0.5, 1, 2, 4, 8, 16], FCT = ["0.25×", "0.5×", "1×", "2×", "4×", "8×", "16×"];
    const GATES = [["method", "g_method"], ["covid_baseline", "g_covid_baseline"]];

    function populate() {
      GATES.forEach(function (g) {
        const sel = document.getElementById(g[1]);
        OPT[g[0]].forEach(function (o) {
          const op = document.createElement("option");
          op.value = String(o[0]); op.textContent = o[1]; sel.appendChild(op);
        });
        sel.value = String(DEF[g[0]]);
        sel.addEventListener("change", render);
      });
    }
    function readSel() {
      return { method: document.getElementById("g_method").value,
               covid_baseline: document.getElementById("g_covid_baseline").value };
    }
    function laneFor(sel, sched) {
      if (sched === "Simultaneous") return "sim";
      if (sched === "Treatment 1 first") return "flu";
      return sel.covid_baseline;
    }
    function statOf(sel, sched, ant, sub) {
      return STATS[[sel.method, laneFor(sel, sched), ant, sub].join("|")];
    }
    function panelTrace(sel, suf, ant, sub) {
      const x = [], q1 = [], md = [], q3 = [], lf = [], uf = [];
      SCHED.forEach(function (sch) {
        const st = statOf(sel, sch, ant, sub);
        x.push(sch);
        q1.push(st ? st.q1 : null); md.push(st ? st.median : null); q3.push(st ? st.q3 : null);
        lf.push(st ? st.p05 : null); uf.push(st ? st.p95 : null);
      });
      return { type: "box", x: x, q1: q1, median: md, q3: q3, lowerfence: lf, upperfence: uf,
               showlegend: false, marker: { color: ANTCOL[ant] || "#3a6ea5" }, line: { width: 1.2 },
               boxpoints: false, xaxis: "x" + suf, yaxis: "y" + suf };
    }
    function buildLayout() {
      const nr = SUB.length, nc = ANT.length, hg = 0.06, vg = 0.16;
      const w = (1 - hg * (nc - 1)) / nc, h = (1 - vg * (nr - 1)) / nr;
      const L = { height: 300 * nr + 120, margin: { l: 60, r: 15, t: 55, b: 45 }, boxmode: "group",
                  showlegend: false, shapes: [], annotations: [], paper_bgcolor: "#fff", plot_bgcolor: "#fff" };
      let idx = 0;
      for (let r = 0; r < nr; r++) for (let c = 0; c < nc; c++) {
        idx++; const suf = idx === 1 ? "" : String(idx);
        const x0 = c * (w + hg), x1 = x0 + w, yt = 1 - r * (h + vg), y0 = yt - h, y1 = yt;
        L["xaxis" + suf] = { domain: [x0, x1], anchor: "y" + suf, type: "category",
                             categoryorder: "array", categoryarray: SCHED, tickfont: { size: 9 } };
        L["yaxis" + suf] = { domain: [y0, y1], anchor: "x" + suf, type: "log", tickvals: FCV, ticktext: FCT,
                             tickfont: { size: 9 }, title: { text: c === 0 ? "Fold change (log)" : "", font: { size: 11 } } };
        L.annotations.push({ text: ANTLAB[ANT[c]] + " · " + SUB[r], x: (x0 + x1) / 2, y: y1,
                             xref: "paper", yref: "paper", xanchor: "center", yanchor: "bottom",
                             showarrow: false, font: { size: 12 } });
        L.shapes.push({ type: "line", xref: "x" + suf + " domain", x0: 0, x1: 1, yref: "y" + suf, y0: 1, y1: 1,
                        line: { color: "#99a3ad", width: 1, dash: "dot" } });
      }
      return L;
    }
    function buildTraces() {
      const sel = readSel(), tr = []; let idx = 0;
      for (let r = 0; r < SUB.length; r++) for (let c = 0; c < ANT.length; c++) {
        idx++; tr.push(panelTrace(sel, idx === 1 ? "" : String(idx), ANT[c], SUB[r]));
      }
      return tr;
    }
    function render() { Plotly.react("explorer-plot", buildTraces(), buildLayout(), { displayModeBar: false, responsive: true }); }
    populate(); render();
